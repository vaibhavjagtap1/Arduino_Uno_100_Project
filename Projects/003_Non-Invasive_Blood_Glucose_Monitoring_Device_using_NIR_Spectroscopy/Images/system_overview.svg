<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="monospace" font-size="11">

  <!-- Dark background -->
  <rect width="900" height="500" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#c9d1d9" font-size="16" font-weight="bold">Project 003 — NIR Glucose Monitor</text>
  <text x="450" y="50" text-anchor="middle" fill="#8b949e" font-size="11">System Architecture — Block Diagram</text>
  <text x="450" y="66" text-anchor="middle" fill="#f85149" font-size="10">⚠ Educational Prototype — Not for Medical Diagnosis</text>

  <!-- ════════════════════════════
       BLOCK 1: Finger Probe
  ════════════════════════════ -->
  <rect x="30" y="120" width="130" height="150" rx="10" fill="#1e2a1e" stroke="#3fb950" stroke-width="2"/>
  <text x="95" y="142" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">Finger Probe</text>
  <!-- Finger illustration -->
  <rect x="50" y="150" width="90" height="40" rx="20" fill="#c9a882" stroke="#8b7355" stroke-width="1.5"/>
  <text x="95" y="174" text-anchor="middle" fill="#1a0a00" font-size="10" font-weight="bold">FINGER</text>
  <!-- LEDs -->
  <circle cx="55" cy="215" r="6" fill="#ff6b35"/>
  <text x="55" y="232" text-anchor="middle" fill="#ff6b35" font-size="8">940nm</text>
  <circle cx="55" cy="245" r="6" fill="#ff4444"/>
  <text x="55" y="262" text-anchor="middle" fill="#ff4444" font-size="8">660nm</text>
  <!-- PD -->
  <circle cx="135" cy="230" r="7" fill="#bc8cff" stroke="#bc8cff" stroke-width="1"/>
  <text x="135" y="250" text-anchor="middle" fill="#bc8cff" font-size="8">BPW34</text>
  <text x="135" y="260" text-anchor="middle" fill="#bc8cff" font-size="8">Photodiode</text>
  <!-- light arrow -->
  <line x1="68" y1="230" x2="122" y2="230" stroke="#ffa657" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="118,226 128,230 118,234" fill="#ffa657"/>

  <!-- Arrow → Signal Conditioning -->
  <line x1="160" y1="195" x2="205" y2="195" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="200,191 210,195 200,199" fill="#58a6ff"/>
  <text x="182" y="188" text-anchor="middle" fill="#8b949e" font-size="8">I_photo</text>

  <!-- ════════════════════════════
       BLOCK 2: Signal Conditioning
  ════════════════════════════ -->
  <rect x="210" y="120" width="130" height="150" rx="10" fill="#1a1a2e" stroke="#bc8cff" stroke-width="2"/>
  <text x="275" y="142" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="bold">Signal</text>
  <text x="275" y="156" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="bold">Conditioning</text>
  <text x="275" y="180" text-anchor="middle" fill="#8b949e" font-size="9">LM358 TIA</text>
  <text x="275" y="194" text-anchor="middle" fill="#8b949e" font-size="9">Rf = 1MΩ</text>
  <text x="275" y="210" text-anchor="middle" fill="#8b949e" font-size="9">I → V conv.</text>
  <text x="275" y="226" text-anchor="middle" fill="#8b949e" font-size="9">2× channels</text>
  <text x="275" y="242" text-anchor="middle" fill="#d29922" font-size="9">V = I × 1MΩ</text>
  <text x="275" y="258" text-anchor="middle" fill="#8b949e" font-size="9">0–5V output</text>

  <!-- Arrow → Arduino ADC -->
  <line x1="340" y1="195" x2="385" y2="195" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="380,191 390,195 380,199" fill="#58a6ff"/>
  <text x="362" y="188" text-anchor="middle" fill="#8b949e" font-size="8">V_out</text>

  <!-- ════════════════════════════
       BLOCK 3: Arduino ADC
  ════════════════════════════ -->
  <rect x="390" y="90" width="130" height="220" rx="10" fill="#1a2332" stroke="#58a6ff" stroke-width="2.5"/>
  <text x="455" y="112" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">Arduino Uno</text>
  <text x="455" y="126" text-anchor="middle" fill="#8b949e" font-size="9">ATmega328P</text>

  <!-- ADC inputs -->
  <text x="455" y="148" text-anchor="middle" fill="#c9d1d9" font-size="9">ADC A0 → 940nm</text>
  <text x="455" y="162" text-anchor="middle" fill="#c9d1d9" font-size="9">ADC A1 → 660nm</text>
  <text x="455" y="176" text-anchor="middle" fill="#c9d1d9" font-size="9">ADC A2 → NTC Temp</text>

  <!-- Processing steps -->
  <rect x="400" y="185" width="110" height="12" rx="3" fill="#21262d"/>
  <text x="455" y="194" text-anchor="middle" fill="#3fb950" font-size="8">32× Sample Average</text>
  <rect x="400" y="200" width="110" height="12" rx="3" fill="#21262d"/>
  <text x="455" y="209" text-anchor="middle" fill="#3fb950" font-size="8">Beer-Lambert Abs</text>
  <rect x="400" y="215" width="110" height="12" rx="3" fill="#21262d"/>
  <text x="455" y="224" text-anchor="middle" fill="#3fb950" font-size="8">Calibration Model</text>
  <rect x="400" y="230" width="110" height="12" rx="3" fill="#21262d"/>
  <text x="455" y="239" text-anchor="middle" fill="#3fb950" font-size="8">Temp Compensation</text>
  <rect x="400" y="245" width="110" height="12" rx="3" fill="#21262d"/>
  <text x="455" y="254" text-anchor="middle" fill="#3fb950" font-size="8">Trend Detection</text>
  <rect x="400" y="260" width="110" height="12" rx="3" fill="#21262d"/>
  <text x="455" y="269" text-anchor="middle" fill="#3fb950" font-size="8">Classify Level</text>

  <!-- LED D5/D6 control arrows going left -->
  <line x1="390" y1="145" x2="280" y2="145" stroke="#ff6b35" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="284,141 274,145 284,149" fill="#ff6b35"/>
  <text x="335" y="140" text-anchor="middle" fill="#ff6b35" font-size="8">D5/D6 PWM</text>

  <!-- ════════════════════════════
       OUTPUT ARROWS (right side)
  ════════════════════════════ -->
  <!-- Arrow to Display/Alert block -->
  <line x1="520" y1="195" x2="565" y2="195" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="560,191 570,195 560,199" fill="#58a6ff"/>

  <!-- ════════════════════════════
       BLOCK 4: Display & Alert
  ════════════════════════════ -->
  <rect x="570" y="90" width="140" height="220" rx="10" fill="#1a2332" stroke="#d29922" stroke-width="2"/>
  <text x="640" y="112" text-anchor="middle" fill="#d29922" font-size="11" font-weight="bold">Display &amp; Alert</text>

  <!-- LCD -->
  <rect x="582" y="120" width="116" height="40" rx="5" fill="#0d3b1a" stroke="#3fb950" stroke-width="1.2"/>
  <text x="640" y="138" text-anchor="middle" fill="#3fb950" font-size="9">LCD 16×2 I2C</text>
  <text x="640" y="152" text-anchor="middle" fill="#3fb950" font-size="8">Glucose + Trend (↑↓→)</text>

  <!-- LED indicators -->
  <circle cx="598" cy="188" r="7" fill="#1a2a1a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="598" y="191" text-anchor="middle" fill="#3fb950" font-size="8">G</text>
  <text x="598" y="204" text-anchor="middle" fill="#3fb950" font-size="7">Normal</text>

  <circle cx="640" cy="188" r="7" fill="#2a2a1a" stroke="#d29922" stroke-width="1.5"/>
  <text x="640" y="191" text-anchor="middle" fill="#d29922" font-size="8">Y</text>
  <text x="640" y="204" text-anchor="middle" fill="#d29922" font-size="7">High</text>

  <circle cx="682" cy="188" r="7" fill="#2a1a1a" stroke="#f85149" stroke-width="1.5"/>
  <text x="682" y="191" text-anchor="middle" fill="#f85149" font-size="8">R</text>
  <text x="682" y="204" text-anchor="middle" fill="#f85149" font-size="7">Alert</text>

  <!-- Buzzer -->
  <rect x="616" y="212" width="48" height="20" rx="5" fill="#1a1a1a" stroke="#ffa657" stroke-width="1.2"/>
  <text x="640" y="225" text-anchor="middle" fill="#ffa657" font-size="9">BUZZER</text>
  <text x="640" y="240" text-anchor="middle" fill="#8b949e" font-size="8">Critical alert</text>

  <!-- Serial output -->
  <rect x="582" y="250" width="116" height="28" rx="5" fill="#21262d" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="640" y="263" text-anchor="middle" fill="#58a6ff" font-size="8">Serial JSON</text>
  <text x="640" y="275" text-anchor="middle" fill="#8b949e" font-size="8">→ PC Dashboard</text>

  <!-- Arrow → PC Dashboard -->
  <line x1="710" y1="264" x2="755" y2="264" stroke="#58a6ff" stroke-width="2"/>
  <polygon points="750,260 760,264 750,268" fill="#58a6ff"/>

  <!-- ════════════════════════════
       BLOCK 5: Python Dashboard
  ════════════════════════════ -->
  <rect x="760" y="130" width="120" height="170" rx="10" fill="#161b22" stroke="#bc8cff" stroke-width="2"/>
  <text x="820" y="152" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="bold">Python</text>
  <text x="820" y="166" text-anchor="middle" fill="#bc8cff" font-size="11" font-weight="bold">Dashboard</text>
  <text x="820" y="186" text-anchor="middle" fill="#8b949e" font-size="9">pyserial</text>
  <text x="820" y="200" text-anchor="middle" fill="#8b949e" font-size="9">matplotlib</text>
  <text x="820" y="217" text-anchor="middle" fill="#c9d1d9" font-size="8">Glucose trend</text>
  <text x="820" y="230" text-anchor="middle" fill="#c9d1d9" font-size="8">Abs trend</text>
  <text x="820" y="243" text-anchor="middle" fill="#c9d1d9" font-size="8">Status panel</text>
  <text x="820" y="256" text-anchor="middle" fill="#c9d1d9" font-size="8">Temp trend</text>
  <text x="820" y="274" text-anchor="middle" fill="#f85149" font-size="8">Disclaimer</text>
  <text x="820" y="287" text-anchor="middle" fill="#f85149" font-size="8">always shown</text>

  <!-- ════════════════════════════
       NTC Thermistor sub-block
  ════════════════════════════ -->
  <rect x="390" y="340" width="130" height="50" rx="8" fill="#1a1a1a" stroke="#ffa657" stroke-width="1.5"/>
  <text x="455" y="361" text-anchor="middle" fill="#ffa657" font-size="10" font-weight="bold">NTC Thermistor</text>
  <text x="455" y="378" text-anchor="middle" fill="#8b949e" font-size="9">10kΩ · A2 · Steinhart-Hart</text>
  <!-- Wire to Arduino ADC -->
  <line x1="455" y1="310" x2="455" y2="340" stroke="#ffa657" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- ════════════════════════════
       Push Button sub-block
  ════════════════════════════ -->
  <rect x="210" y="340" width="130" height="50" rx="8" fill="#1a1a1a" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="275" y="361" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="bold">Push Button</text>
  <text x="275" y="378" text-anchor="middle" fill="#8b949e" font-size="9">D2 · 10kΩ pull-down · ISR</text>
  <!-- Wire up -->
  <line x1="275" y1="310" x2="275" y2="340" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="275" y1="310" x2="390" y2="185" stroke="#58a6ff" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- ════════════════════════════
       Legend / flow label
  ════════════════════════════ -->
  <rect x="30" y="415" width="840" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="433" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="bold">Signal Flow</text>
  <line x1="50" y1="447" x2="80" y2="447" stroke="#3fb950" stroke-width="2"/>
  <text x="130" y="450" fill="#c9d1d9" font-size="9">Optical / probe path</text>
  <line x1="240" y1="447" x2="270" y2="447" stroke="#bc8cff" stroke-width="2"/>
  <text x="320" y="450" fill="#c9d1d9" font-size="9">Electrical signal</text>
  <line x1="430" y1="447" x2="460" y2="447" stroke="#58a6ff" stroke-width="2"/>
  <text x="510" y="450" fill="#c9d1d9" font-size="9">Data / control</text>
  <line x1="620" y1="447" x2="650" y2="447" stroke="#ffa657" stroke-width="2"/>
  <text x="700" y="450" fill="#c9d1d9" font-size="9">Temperature</text>

  <text x="450" y="474" text-anchor="middle" fill="#8b949e" font-size="9">Beer-Lambert: A = log₁₀(I₀/I)   ·   Glucose Estimate = CALIB_A × (A_940/A_660) + CALIB_B   ·   Temperature compensation: ΔG = 0.5 × (T − 37°C)</text>

</svg>
