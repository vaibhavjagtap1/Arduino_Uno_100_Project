<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <!-- Arrowhead marker -->
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b949e"/>
    </marker>
    <marker id="arr-blue" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arr-orange" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#ffa657"/>
    </marker>
    <marker id="arr-red" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f85149"/>
    </marker>
    <marker id="arr-yellow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#e3b341"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="15" font-weight="bold" fill="#c9d1d9">
    Project 004 — State Machine Overview
  </text>
  <text x="450" y="54" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="10" fill="#8b949e">
    Autonomous Line-Following Robot with Obstacle Avoidance
  </text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- STATE: LINE_FOLLOW  (center)                  -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="335" y="195" width="160" height="60" rx="12" fill="#0d2137" stroke="#58a6ff" stroke-width="2.5"/>
  <text x="415" y="221" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#58a6ff">LINE_FOLLOW</text>
  <text x="415" y="239" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#8b949e">PID · Drive forward</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- STATE: OBSTACLE_DETECTED  (top center)        -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="320" y="68" width="190" height="60" rx="12" fill="#2d0f0f" stroke="#f85149" stroke-width="2.5"/>
  <text x="415" y="94" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#f85149">OBSTACLE_DETECTED</text>
  <text x="415" y="112" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Stop · Check clearance</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- STATE: AVOID_LEFT  (left)                     -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="80" y="200" width="150" height="60" rx="12" fill="#2d1b00" stroke="#ffa657" stroke-width="2.5"/>
  <text x="155" y="226" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#ffa657">AVOID_LEFT</text>
  <text x="155" y="244" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Turn left · Bypass</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- STATE: AVOID_RIGHT  (right)                   -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="600" y="200" width="155" height="60" rx="12" fill="#2d1b00" stroke="#ffa657" stroke-width="2.5"/>
  <text x="677" y="226" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#ffa657">AVOID_RIGHT</text>
  <text x="677" y="244" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Turn right · Bypass</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- STATE: SEARCH  (bottom center)                -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="335" y="360" width="160" height="60" rx="12" fill="#2a2200" stroke="#e3b341" stroke-width="2.5"/>
  <text x="415" y="386" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="12" font-weight="bold" fill="#e3b341">SEARCH</text>
  <text x="415" y="404" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Spin · Re-acquire line</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- ARROWS                                        -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- LINE_FOLLOW → OBSTACLE_DETECTED (straight up) -->
  <line x1="415" y1="195" x2="415" y2="128" stroke="#f85149" stroke-width="1.8" marker-end="url(#arr-red)"/>
  <rect x="350" y="150" width="130" height="18" rx="3" fill="#0d1117"/>
  <text x="415" y="163" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#f85149">dist &lt; 15 cm</text>

  <!-- OBSTACLE_DETECTED → AVOID_LEFT (left diagonal) -->
  <line x1="320" y1="100" x2="230" y2="215" stroke="#ffa657" stroke-width="1.8" marker-end="url(#arr-orange)"/>
  <rect x="230" y="138" width="80" height="18" rx="3" fill="#0d1117"/>
  <text x="270" y="151" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#ffa657">left clear</text>

  <!-- OBSTACLE_DETECTED → AVOID_RIGHT (right diagonal) -->
  <line x1="510" y1="100" x2="610" y2="215" stroke="#ffa657" stroke-width="1.8" marker-end="url(#arr-orange)"/>
  <rect x="520" y="138" width="82" height="18" rx="3" fill="#0d1117"/>
  <text x="561" y="151" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#ffa657">right clear</text>

  <!-- AVOID_LEFT → LINE_FOLLOW (curved: left side arc down) -->
  <!-- Path: exit bottom of AVOID_LEFT, curve to left of LINE_FOLLOW -->
  <path d="M155,260 C155,310 260,310 335,230" fill="none" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <rect x="145" y="296" width="82" height="18" rx="3" fill="#0d1117"/>
  <text x="186" y="309" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#58a6ff">line found</text>

  <!-- AVOID_RIGHT → LINE_FOLLOW (curved: right side arc down) -->
  <path d="M677,260 C677,310 560,310 495,230" fill="none" stroke="#58a6ff" stroke-width="1.8" marker-end="url(#arr-blue)"/>
  <rect x="600" y="296" width="82" height="18" rx="3" fill="#0d1117"/>
  <text x="641" y="309" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#58a6ff">line found</text>

  <!-- LINE_FOLLOW → SEARCH (straight down) -->
  <line x1="415" y1="255" x2="415" y2="360" stroke="#e3b341" stroke-width="1.8" marker-end="url(#arr-yellow)"/>
  <rect x="320" y="296" width="130" height="18" rx="3" fill="#0d1117"/>
  <text x="385" y="309" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#e3b341">all sensors off</text>

  <!-- SEARCH → LINE_FOLLOW (curved right side return) -->
  <path d="M495,390 C570,390 570,255 495,240" fill="none" stroke="#58a6ff" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr-blue)"/>
  <rect x="510" y="346" width="82" height="18" rx="3" fill="#0d1117"/>
  <text x="551" y="359" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" fill="#58a6ff">line found</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- Legend                                        -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="20" y="410" width="220" height="72" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="130" y="428" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#c9d1d9">Legend</text>
  <line x1="32" y1="440" x2="58" y2="440" stroke="#58a6ff" stroke-width="2"/>
  <text x="66" y="444" font-family="'Courier New', monospace" font-size="8" fill="#58a6ff">Normal transition</text>
  <line x1="32" y1="455" x2="58" y2="455" stroke="#58a6ff" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="66" y="459" font-family="'Courier New', monospace" font-size="8" fill="#58a6ff">Recovery transition</text>
  <line x1="32" y1="470" x2="58" y2="470" stroke="#f85149" stroke-width="2"/>
  <text x="66" y="474" font-family="'Courier New', monospace" font-size="8" fill="#f85149">Obstacle trigger</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- State colour key                              -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="680" y="410" width="200" height="72" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="780" y="428" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#c9d1d9">States</text>
  <rect x="690" y="435" width="10" height="10" rx="2" fill="#58a6ff"/>
  <text x="706" y="445" font-family="'Courier New', monospace" font-size="8" fill="#58a6ff">LINE_FOLLOW / SEARCH</text>
  <rect x="690" y="450" width="10" height="10" rx="2" fill="#f85149"/>
  <text x="706" y="460" font-family="'Courier New', monospace" font-size="8" fill="#f85149">OBSTACLE_DETECTED</text>
  <rect x="690" y="465" width="10" height="10" rx="2" fill="#ffa657"/>
  <text x="706" y="475" font-family="'Courier New', monospace" font-size="8" fill="#ffa657">AVOID_LEFT / AVOID_RIGHT</text>
</svg>
