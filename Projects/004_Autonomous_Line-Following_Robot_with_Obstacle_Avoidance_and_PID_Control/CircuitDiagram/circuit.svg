<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="1000" height="650">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#79c0ff"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ffa657"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="650" fill="#0d1117"/>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#c9d1d9">Project 004 — Line Following Robot Circuit</text>
  <text x="500" y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#8b949e">Arduino Uno R3 + 5× IR Sensors + HC-SR04 + L298N Motor Driver</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- ARDUINO UNO (center)                               -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="370" y="180" width="200" height="290" rx="8" ry="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="470" y="205" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#58a6ff">Arduino Uno R3</text>
  <text x="470" y="221" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">ATmega328P · 5V · 16MHz</text>

  <!-- Arduino pin labels left side -->
  <text x="378" y="248" font-family="'Courier New', monospace" font-size="9" fill="#c9d1d9">D2  ●</text>
  <text x="378" y="263" font-family="'Courier New', monospace" font-size="9" fill="#c9d1d9">D3  ●</text>
  <text x="378" y="278" font-family="'Courier New', monospace" font-size="9" fill="#c9d1d9">A0  ●</text>
  <text x="378" y="293" font-family="'Courier New', monospace" font-size="9" fill="#c9d1d9">A1  ●</text>
  <text x="378" y="308" font-family="'Courier New', monospace" font-size="9" fill="#c9d1d9">A2  ●</text>
  <text x="378" y="330" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">D8  ●</text>
  <text x="378" y="345" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff">D9  ●</text>
  <text x="378" y="367" font-family="'Courier New', monospace" font-size="9" fill="#e3b341">D13 ●</text>

  <!-- Arduino pin labels right side -->
  <text x="516" y="248" font-family="'Courier New', monospace" font-size="9" fill="#ffa657">● D10(ENA)</text>
  <text x="516" y="263" font-family="'Courier New', monospace" font-size="9" fill="#ffa657">● D4 (IN1)</text>
  <text x="516" y="278" font-family="'Courier New', monospace" font-size="9" fill="#ffa657">● D5 (IN2)</text>
  <text x="516" y="293" font-family="'Courier New', monospace" font-size="9" fill="#ffa657">● D11(ENB)</text>
  <text x="516" y="308" font-family="'Courier New', monospace" font-size="9" fill="#ffa657">● D6 (IN3)</text>
  <text x="516" y="323" font-family="'Courier New', monospace" font-size="9" fill="#ffa657">● D7 (IN4)</text>
  <text x="516" y="390" font-family="'Courier New', monospace" font-size="9" fill="#e3b341">● 5V</text>
  <text x="516" y="405" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">● GND</text>
  <text x="516" y="420" font-family="'Courier New', monospace" font-size="9" fill="#e3b341">● VIN</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- IR SENSORS (top row, S0–S4)                        -->
  <!-- ═══════════════════════════════════════════════════ -->
  <!-- S0 -->
  <rect x="60" y="70" width="70" height="50" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="95" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#3fb950">S0</text>
  <text x="95" y="104" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">TCRT5000</text>
  <text x="95" y="116" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">D2</text>

  <!-- S1 -->
  <rect x="155" y="70" width="70" height="50" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="190" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#3fb950">S1</text>
  <text x="190" y="104" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">TCRT5000</text>
  <text x="190" y="116" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">D3</text>

  <!-- S2 -->
  <rect x="250" y="70" width="70" height="50" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="285" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#3fb950">S2</text>
  <text x="285" y="104" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">TCRT5000</text>
  <text x="285" y="116" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">A0</text>

  <!-- S3 -->
  <rect x="345" y="70" width="70" height="50" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="380" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#3fb950">S3</text>
  <text x="380" y="104" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">TCRT5000</text>
  <text x="380" y="116" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">A1</text>

  <!-- S4 -->
  <rect x="440" y="70" width="70" height="50" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="475" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#3fb950">S4</text>
  <text x="475" y="104" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">TCRT5000</text>
  <text x="475" y="116" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">A2</text>

  <!-- IR sensor wires → Arduino -->
  <!-- S0 → D2 -->
  <line x1="95" y1="120" x2="95" y2="155" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="95" y1="155" x2="370" y2="245" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <!-- S1 → D3 -->
  <line x1="190" y1="120" x2="190" y2="160" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="190" y1="160" x2="370" y2="260" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <!-- S2 → A0 -->
  <line x1="285" y1="120" x2="285" y2="165" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="285" y1="165" x2="370" y2="275" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <!-- S3 → A1 -->
  <line x1="380" y1="120" x2="380" y2="170" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="380" y1="170" x2="375" y2="290" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>
  <!-- S4 → A2 -->
  <line x1="475" y1="120" x2="475" y2="170" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="475" y1="170" x2="380" y2="305" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-green)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- HC-SR04 (top right)                                -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="800" y="70" width="140" height="70" rx="5" fill="#161b22" stroke="#79c0ff" stroke-width="1.5"/>
  <text x="870" y="92" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#79c0ff">HC-SR04</text>
  <text x="870" y="108" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Ultrasonic Sensor</text>
  <text x="820" y="126" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">TRIG  ECHO</text>
  <text x="820" y="136" font-family="'Courier New', monospace" font-size="9" fill="#79c0ff"> D8    D9</text>

  <!-- HC-SR04 wires → Arduino -->
  <line x1="840" y1="140" x2="840" y2="175" stroke="#79c0ff" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="840" y1="175" x2="570" y2="327" stroke="#79c0ff" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)"/>
  <line x1="880" y1="140" x2="880" y2="180" stroke="#79c0ff" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="880" y1="180" x2="570" y2="342" stroke="#79c0ff" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- L298N Motor Driver (right)                          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="700" y="210" width="155" height="200" rx="5" fill="#161b22" stroke="#ffa657" stroke-width="2"/>
  <text x="777" y="232" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#ffa657">L298N</text>
  <text x="777" y="248" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Motor Driver</text>

  <!-- L298N pin labels (left input side) -->
  <text x="708" y="270" font-family="'Courier New', monospace" font-size="9" fill="#c9d1d9">ENA ●</text>
  <text x="708" y="285" font-family="'Courier New', monospace" font-size="9" fill="#c9d1d9">IN1 ●</text>
  <text x="708" y="300" font-family="'Courier New', monospace" font-size="9" fill="#c9d1d9">IN2 ●</text>
  <text x="708" y="315" font-family="'Courier New', monospace" font-size="9" fill="#c9d1d9">ENB ●</text>
  <text x="708" y="330" font-family="'Courier New', monospace" font-size="9" fill="#c9d1d9">IN3 ●</text>
  <text x="708" y="345" font-family="'Courier New', monospace" font-size="9" fill="#c9d1d9">IN4 ●</text>
  <text x="708" y="365" font-family="'Courier New', monospace" font-size="9" fill="#e3b341">12V ●</text>
  <text x="708" y="380" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">GND ●</text>

  <!-- L298N output labels (right side) -->
  <text x="800" y="285" font-family="'Courier New', monospace" font-size="9" fill="#ffa657">OUT A1</text>
  <text x="800" y="300" font-family="'Courier New', monospace" font-size="9" fill="#ffa657">OUT A2</text>
  <text x="800" y="345" font-family="'Courier New', monospace" font-size="9" fill="#ffa657">OUT B1</text>
  <text x="800" y="360" font-family="'Courier New', monospace" font-size="9" fill="#ffa657">OUT B2</text>

  <!-- Wires Arduino → L298N -->
  <line x1="570" y1="245" x2="700" y2="268" stroke="#ffa657" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="570" y1="260" x2="700" y2="282" stroke="#ffa657" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="570" y1="275" x2="700" y2="297" stroke="#ffa657" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="570" y1="290" x2="700" y2="312" stroke="#ffa657" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="570" y1="305" x2="700" y2="327" stroke="#ffa657" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="570" y1="320" x2="700" y2="342" stroke="#ffa657" stroke-width="1.2" marker-end="url(#arrow-orange)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- MOTOR A & MOTOR B                                  -->
  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Motor A -->
  <rect x="880" y="230" width="100" height="50" rx="5" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="930" y="252" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#ffa657">Motor A</text>
  <text x="930" y="268" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">6V DC Left</text>
  <line x1="855" y1="287" x2="880" y2="255" stroke="#ffa657" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="855" y1="297" x2="880" y2="265" stroke="#ffa657" stroke-width="1.2" marker-end="url(#arrow-orange)"/>

  <!-- Motor B -->
  <rect x="880" y="310" width="100" height="50" rx="5" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
  <text x="930" y="332" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#ffa657">Motor B</text>
  <text x="930" y="348" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">6V DC Right</text>
  <line x1="855" y1="342" x2="880" y2="328" stroke="#ffa657" stroke-width="1.2" marker-end="url(#arrow-orange)"/>
  <line x1="855" y1="357" x2="880" y2="345" stroke="#ffa657" stroke-width="1.2" marker-end="url(#arrow-orange)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- 7.4V LiPo Battery (bottom left)                   -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="60" y="530" width="140" height="70" rx="5" fill="#161b22" stroke="#e3b341" stroke-width="2"/>
  <text x="130" y="555" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#e3b341">7.4V LiPo</text>
  <text x="130" y="571" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">1200mAh 2S 20C</text>
  <text x="130" y="587" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">Main Power</text>

  <!-- Battery → L298N power -->
  <line x1="200" y1="565" x2="730" y2="365" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- 5V Buck Converter (bottom center)                  -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="300" y="530" width="150" height="70" rx="5" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="375" y="555" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold" fill="#e3b341">5V Regulator</text>
  <text x="375" y="571" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">LM7805 / Buck</text>
  <text x="375" y="587" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">IN: 7.4V → 5V</text>

  <!-- Regulator → Arduino 5V -->
  <line x1="375" y1="530" x2="470" y2="470" stroke="#e3b341" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <!-- Battery → Regulator -->
  <line x1="200" y1="572" x2="300" y2="572" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LED D13 (small, with resistor)                     -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="230" y="360" width="80" height="45" rx="5" fill="#161b22" stroke="#e3b341" stroke-width="1.2"/>
  <text x="270" y="379" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#e3b341">LED (Red)</text>
  <text x="270" y="393" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#8b949e">220Ω · D13</text>
  <!-- LED wire → Arduino D13 -->
  <line x1="310" y1="382" x2="370" y2="364" stroke="#e3b341" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Ground bus -->
  <line x1="130" y1="600" x2="470" y2="445" stroke="#8b949e" stroke-width="1" stroke-dasharray="3,4"/>
  <text x="200" y="618" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#8b949e">GND (common)</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Legend                                             -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="30" y="430" width="165" height="85" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="112" y="448" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" font-weight="bold" fill="#c9d1d9">Legend</text>
  <line x1="40" y1="458" x2="68" y2="458" stroke="#3fb950" stroke-width="2"/>
  <text x="74" y="462" font-family="'Courier New', monospace" font-size="8" fill="#3fb950">IR Sensors</text>
  <line x1="40" y1="472" x2="68" y2="472" stroke="#79c0ff" stroke-width="2"/>
  <text x="74" y="476" font-family="'Courier New', monospace" font-size="8" fill="#79c0ff">HC-SR04</text>
  <line x1="40" y1="486" x2="68" y2="486" stroke="#ffa657" stroke-width="2"/>
  <text x="74" y="490" font-family="'Courier New', monospace" font-size="8" fill="#ffa657">Motors / Driver</text>
  <line x1="40" y1="500" x2="68" y2="500" stroke="#e3b341" stroke-width="2"/>
  <text x="74" y="504" font-family="'Courier New', monospace" font-size="8" fill="#e3b341">Power Rails</text>
</svg>
