<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700" style="background:#0d1117;font-family:monospace">
  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold">Project 005 — Smart Energy Management System (Solar-Battery Microgrid)</text>

  <!-- Solar Panel -->
  <rect x="30" y="80" width="130" height="80" rx="6" fill="#1c2128" stroke="#f0883e" stroke-width="2"/>
  <text x="95" y="112" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">Solar Panel</text>
  <text x="95" y="130" text-anchor="middle" fill="#8b949e" font-size="10">12V 20W</text>
  <text x="95" y="148" text-anchor="middle" fill="#8b949e" font-size="10">Voc ≈ 21V</text>

  <!-- MPPT Buck Converter -->
  <rect x="220" y="80" width="130" height="80" rx="6" fill="#1c2128" stroke="#f0883e" stroke-width="2"/>
  <text x="285" y="108" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="bold">MPPT Buck</text>
  <text x="285" y="124" text-anchor="middle" fill="#8b949e" font-size="10">IRFZ44N MOSFET</text>
  <text x="285" y="140" text-anchor="middle" fill="#8b949e" font-size="10">100µH Inductor</text>
  <text x="285" y="156" text-anchor="middle" fill="#8b949e" font-size="10">Schottky Diode</text>

  <!-- INA219 Solar -->
  <rect x="220" y="210" width="130" height="60" rx="6" fill="#1c2128" stroke="#79c0ff" stroke-width="2"/>
  <text x="285" y="234" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">INA219 #1</text>
  <text x="285" y="250" text-anchor="middle" fill="#8b949e" font-size="10">Solar Monitor</text>
  <text x="285" y="265" text-anchor="middle" fill="#8b949e" font-size="10">I2C 0x40</text>

  <!-- Solar → MPPT wire -->
  <line x1="160" y1="120" x2="220" y2="120" stroke="#f0883e" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="190" y="114" text-anchor="middle" fill="#f0883e" font-size="9">+V</text>

  <!-- MPPT → INA219 Solar (series shunt) -->
  <line x1="285" y1="160" x2="285" y2="210" stroke="#f0883e" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Battery -->
  <rect x="430" y="80" width="140" height="80" rx="6" fill="#1c2128" stroke="#3fb950" stroke-width="2"/>
  <text x="500" y="108" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">Battery</text>
  <text x="500" y="126" text-anchor="middle" fill="#8b949e" font-size="10">12V 7Ah SLA</text>
  <text x="500" y="144" text-anchor="middle" fill="#8b949e" font-size="10">or 3S 18650</text>
  <text x="500" y="160" text-anchor="middle" fill="#8b949e" font-size="9">SOC 0–100%</text>

  <!-- INA219 Battery -->
  <rect x="430" y="210" width="140" height="60" rx="6" fill="#1c2128" stroke="#79c0ff" stroke-width="2"/>
  <text x="500" y="234" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">INA219 #2</text>
  <text x="500" y="250" text-anchor="middle" fill="#8b949e" font-size="10">Battery Monitor</text>
  <text x="500" y="265" text-anchor="middle" fill="#8b949e" font-size="10">I2C 0x41</text>

  <!-- MPPT → Battery -->
  <line x1="350" y1="120" x2="430" y2="120" stroke="#f0883e" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="390" y="114" text-anchor="middle" fill="#f0883e" font-size="9">Charge</text>

  <!-- Battery → INA219 Battery -->
  <line x1="500" y1="160" x2="500" y2="210" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Arduino Uno -->
  <rect x="390" y="340" width="220" height="180" rx="8" fill="#1c2128" stroke="#58a6ff" stroke-width="2.5"/>
  <text x="500" y="365" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">Arduino Uno R3</text>
  <text x="500" y="385" text-anchor="middle" fill="#8b949e" font-size="10">ATmega328P</text>
  <text x="420" y="410" fill="#c9d1d9" font-size="9">D4–D7: Relay IN</text>
  <text x="420" y="425" fill="#c9d1d9" font-size="9">D9: MPPT PWM</text>
  <text x="420" y="440" fill="#c9d1d9" font-size="9">D11: Green LED</text>
  <text x="420" y="455" fill="#c9d1d9" font-size="9">D12: Red LED</text>
  <text x="420" y="470" fill="#c9d1d9" font-size="9">D13: Buzzer</text>
  <text x="420" y="485" fill="#c9d1d9" font-size="9">A2: V-divider</text>
  <text x="420" y="500" fill="#c9d1d9" font-size="9">I2C: INA219 ×3 + LCD</text>

  <!-- INA219s → Arduino (I2C bus) -->
  <line x1="285" y1="270" x2="285" y2="320" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="285" y1="320" x2="500" y2="340" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-blue)"/>
  <line x1="500" y1="270" x2="500" y2="295" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="500" y1="295" x2="500" y2="340" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="340" y="315" fill="#79c0ff" font-size="9" text-anchor="middle">I2C Bus (SDA/SCL)</text>

  <!-- MPPT PWM → MPPT Buck -->
  <line x1="390" y1="430" x2="285" y2="430" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="285" y1="430" x2="285" y2="160" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-orange)"/>
  <text x="320" y="424" fill="#f0883e" font-size="9">D9 MPPT PWM</text>

  <!-- 4-Channel Relay Module -->
  <rect x="660" y="200" width="150" height="120" rx="6" fill="#1c2128" stroke="#f85149" stroke-width="2"/>
  <text x="735" y="224" text-anchor="middle" fill="#f85149" font-size="11" font-weight="bold">4-Ch Relay Module</text>
  <text x="735" y="244" text-anchor="middle" fill="#8b949e" font-size="10">Load 1 (D4) — High Pri</text>
  <text x="735" y="260" text-anchor="middle" fill="#8b949e" font-size="10">Load 2 (D5)</text>
  <text x="735" y="276" text-anchor="middle" fill="#8b949e" font-size="10">Load 3 (D6)</text>
  <text x="735" y="292" text-anchor="middle" fill="#8b949e" font-size="10">Load 4 (D7) — Low Pri</text>
  <text x="735" y="314" text-anchor="middle" fill="#8b949e" font-size="9">Opto-isolated 10A</text>

  <!-- Arduino → Relay -->
  <line x1="610" y1="420" x2="735" y2="420" stroke="#f85149" stroke-width="1.5"/>
  <line x1="735" y1="420" x2="735" y2="320" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="672" y="414" fill="#f85149" font-size="9" text-anchor="middle">D4–D7</text>

  <!-- INA219 Load -->
  <rect x="660" y="380" width="150" height="60" rx="6" fill="#1c2128" stroke="#79c0ff" stroke-width="2"/>
  <text x="735" y="404" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">INA219 #3</text>
  <text x="735" y="420" text-anchor="middle" fill="#8b949e" font-size="10">Load Monitor</text>
  <text x="735" y="436" text-anchor="middle" fill="#8b949e" font-size="10">I2C 0x44</text>

  <!-- INA219 Load → I2C Bus -->
  <line x1="660" y1="410" x2="610" y2="410" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-blue)"/>

  <!-- LCD -->
  <rect x="660" y="80" width="150" height="70" rx="6" fill="#1c2128" stroke="#58a6ff" stroke-width="2"/>
  <text x="735" y="104" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">16×2 LCD (I2C)</text>
  <text x="735" y="122" text-anchor="middle" fill="#8b949e" font-size="10">SDA=A4, SCL=A5</text>
  <text x="735" y="138" text-anchor="middle" fill="#8b949e" font-size="10">0x27, HD44780</text>

  <!-- LCD → I2C Bus -->
  <line x1="660" y1="115" x2="610" y2="365" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-blue)"/>

  <!-- LEDs + Buzzer -->
  <rect x="30" y="420" width="200" height="120" rx="6" fill="#1c2128" stroke="#8b949e" stroke-width="1.5"/>
  <text x="130" y="443" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="bold">Indicators</text>
  <circle cx="70" cy="470" r="10" fill="#3fb950"/>
  <text x="90" y="475" fill="#c9d1d9" font-size="10">Green LED D11 — Charging</text>
  <circle cx="70" cy="500" r="10" fill="#f85149"/>
  <text x="90" y="505" fill="#c9d1d9" font-size="10">Red LED D12 — Batt Low</text>
  <rect x="58" y="522" width="24" height="10" rx="3" fill="#c9d1d9" stroke="#8b949e"/>
  <text x="90" y="532" fill="#c9d1d9" font-size="10">Buzzer D13 — Critical</text>

  <!-- Arduino → Indicators -->
  <line x1="390" y1="470" x2="230" y2="470" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="310" y="464" fill="#8b949e" font-size="9" text-anchor="middle">D11/D12/D13</text>

  <!-- Voltage Divider -->
  <rect x="30" y="300" width="160" height="80" rx="6" fill="#1c2128" stroke="#8b949e" stroke-width="1.5"/>
  <text x="110" y="322" text-anchor="middle" fill="#c9d1d9" font-size="10" font-weight="bold">Voltage Divider (A2)</text>
  <text x="110" y="340" text-anchor="middle" fill="#8b949e" font-size="9">100kΩ + 47kΩ</text>
  <text x="110" y="356" text-anchor="middle" fill="#8b949e" font-size="9">Battery V backup</text>
  <text x="110" y="372" text-anchor="middle" fill="#8b949e" font-size="9">to Arduino A2</text>

  <!-- Divider → Arduino -->
  <line x1="190" y1="340" x2="390" y2="390" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-gray)"/>

  <!-- Battery → Voltage Divider -->
  <line x1="430" y1="150" x2="110" y2="150" stroke="#3fb950" stroke-width="1.5"/>
  <line x1="110" y1="150" x2="110" y2="300" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Battery → Relay (power) -->
  <line x1="570" y1="120" x2="735" y2="120" stroke="#3fb950" stroke-width="1.5"/>
  <line x1="735" y1="120" x2="735" y2="200" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="652" y="114" fill="#3fb950" font-size="9" text-anchor="middle">12V power to loads</text>

  <!-- Legend -->
  <rect x="30" y="590" width="940" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="612" fill="#58a6ff" font-size="11" font-weight="bold">Legend:</text>
  <line x1="120" y1="608" x2="170" y2="608" stroke="#f0883e" stroke-width="2"/>
  <text x="175" y="612" fill="#f0883e" font-size="10">Solar / MPPT Power Flow</text>
  <line x1="320" y1="608" x2="370" y2="608" stroke="#3fb950" stroke-width="2"/>
  <text x="375" y="612" fill="#3fb950" font-size="10">Battery / Charging</text>
  <line x1="490" y1="608" x2="540" y2="608" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="545" y="612" fill="#79c0ff" font-size="10">I2C Bus (SDA/SCL)</text>
  <line x1="680" y1="608" x2="730" y2="608" stroke="#f85149" stroke-width="1.5"/>
  <text x="735" y="612" fill="#f85149" font-size="10">Load Control Signals</text>
  <text x="60" y="650" fill="#8b949e" font-size="10">MPPT = Maximum Power Point Tracking (Perturb &amp; Observe)</text>
  <text x="400" y="650" fill="#8b949e" font-size="10">SOC = State of Charge | BULK → ABSORPTION → FLOAT charge stages</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f0883e"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#79c0ff"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f85149"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
