<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" style="background:#0d1117;font-family:monospace">
  <text x="450" y="35" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold">Project 005 — Smart Energy Management System Architecture</text>

  <!-- Solar Panel block -->
  <rect x="30" y="80" width="130" height="70" rx="8" fill="#1c2128" stroke="#f0883e" stroke-width="2"/>
  <text x="95" y="108" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">☀️ Solar Panel</text>
  <text x="95" y="128" text-anchor="middle" fill="#8b949e" font-size="10">12V 20W</text>
  <text x="95" y="144" text-anchor="middle" fill="#8b949e" font-size="9">INA219 #1 monitor</text>

  <!-- MPPT block -->
  <rect x="220" y="80" width="130" height="70" rx="8" fill="#1c2128" stroke="#f0883e" stroke-width="2"/>
  <text x="285" y="108" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">⚡ MPPT</text>
  <text x="285" y="126" text-anchor="middle" fill="#8b949e" font-size="10">P&amp;O Algorithm</text>
  <text x="285" y="142" text-anchor="middle" fill="#8b949e" font-size="9">Buck Converter</text>

  <!-- Arrow Solar→MPPT -->
  <line x1="160" y1="115" x2="218" y2="115" stroke="#f0883e" stroke-width="2" marker-end="url(#ao)"/>

  <!-- Battery block -->
  <rect x="220" y="220" width="130" height="70" rx="8" fill="#1c2128" stroke="#3fb950" stroke-width="2"/>
  <text x="285" y="248" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">🔋 Battery</text>
  <text x="285" y="266" text-anchor="middle" fill="#8b949e" font-size="10">12V 7Ah</text>
  <text x="285" y="282" text-anchor="middle" fill="#8b949e" font-size="9">INA219 #2 monitor</text>

  <!-- Arrow MPPT→Battery -->
  <line x1="285" y1="150" x2="285" y2="218" stroke="#f0883e" stroke-width="2" marker-end="url(#ao)"/>
  <text x="305" y="188" fill="#f0883e" font-size="9">Charge</text>

  <!-- Arduino block (center) -->
  <rect x="390" y="160" width="160" height="160" rx="10" fill="#1c2128" stroke="#58a6ff" stroke-width="2.5"/>
  <text x="470" y="188" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="bold">Arduino Uno</text>
  <text x="470" y="208" text-anchor="middle" fill="#8b949e" font-size="9">P&amp;O MPPT Control</text>
  <text x="470" y="224" text-anchor="middle" fill="#8b949e" font-size="9">SOC Estimation</text>
  <text x="470" y="240" text-anchor="middle" fill="#8b949e" font-size="9">Charge State Machine</text>
  <text x="470" y="256" text-anchor="middle" fill="#8b949e" font-size="9">Load Shedding Logic</text>
  <text x="470" y="272" text-anchor="middle" fill="#8b949e" font-size="9">JSON Serial Output</text>
  <text x="470" y="292" text-anchor="middle" fill="#58a6ff" font-size="9">ATmega328P @ 16 MHz</text>
  <text x="470" y="308" text-anchor="middle" fill="#8b949e" font-size="9">I2C ← INA219 ×3 + LCD</text>

  <!-- INA219s → Arduino -->
  <line x1="350" y1="255" x2="390" y2="255" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#ab)"/>
  <text x="370" y="248" fill="#79c0ff" font-size="8" text-anchor="middle">I2C</text>

  <!-- Battery → Arduino -->
  <line x1="350" y1="255" x2="350" y2="255" stroke="#3fb950" stroke-width="1"/>

  <!-- Loads block -->
  <rect x="640" y="80" width="230" height="180" rx="8" fill="#1c2128" stroke="#f85149" stroke-width="2"/>
  <text x="755" y="106" text-anchor="middle" fill="#f85149" font-size="12" font-weight="bold">🔌 Loads</text>
  <text x="755" y="126" text-anchor="middle" fill="#8b949e" font-size="10">4-Channel Relay</text>
  <text x="755" y="146" text-anchor="middle" fill="#c9d1d9" font-size="10">● Load 1 — Critical (D4)</text>
  <text x="755" y="164" text-anchor="middle" fill="#c9d1d9" font-size="10">● Load 2 — High (D5)</text>
  <text x="755" y="182" text-anchor="middle" fill="#c9d1d9" font-size="10">● Load 3 — Medium (D6)</text>
  <text x="755" y="200" text-anchor="middle" fill="#c9d1d9" font-size="10">● Load 4 — Low (D7)</text>
  <text x="755" y="222" text-anchor="middle" fill="#8b949e" font-size="9">Shed when SOC &lt; 30%</text>
  <text x="755" y="240" text-anchor="middle" fill="#8b949e" font-size="9">INA219 #3 monitor</text>

  <!-- Arrow Arduino→Loads -->
  <line x1="550" y1="200" x2="638" y2="170" stroke="#f85149" stroke-width="2" marker-end="url(#ar)"/>
  <text x="594" y="178" fill="#f85149" font-size="9" text-anchor="middle">D4–D7</text>

  <!-- Display block -->
  <rect x="640" y="310" width="140" height="60" rx="8" fill="#1c2128" stroke="#58a6ff" stroke-width="2"/>
  <text x="710" y="334" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="bold">16×2 LCD</text>
  <text x="710" y="352" text-anchor="middle" fill="#8b949e" font-size="10">Solar W | SOC% | State</text>

  <!-- Arrow Arduino→LCD -->
  <line x1="550" y1="270" x2="638" y2="330" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#as)"/>
  <text x="598" y="315" fill="#58a6ff" font-size="9" text-anchor="middle">I2C</text>

  <!-- Indicators block -->
  <rect x="640" y="400" width="140" height="70" rx="8" fill="#1c2128" stroke="#8b949e" stroke-width="1.5"/>
  <text x="710" y="422" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="bold">Indicators</text>
  <text x="710" y="440" text-anchor="middle" fill="#3fb950" font-size="10">● Green D11 Charging</text>
  <text x="710" y="456" text-anchor="middle" fill="#f85149" font-size="10">● Red D12 Batt Low</text>
  <text x="710" y="472" text-anchor="middle" fill="#c9d1d9" font-size="10">♫ Buzzer D13 Critical</text>

  <!-- Arrow Arduino→Indicators -->
  <line x1="550" y1="290" x2="638" y2="410" stroke="#8b949e" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="598" y="370" fill="#8b949e" font-size="9" text-anchor="middle">D11–D13</text>

  <!-- Python Dashboard block -->
  <rect x="30" y="380" width="300" height="80" rx="8" fill="#161b22" stroke="#79c0ff" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="180" y="404" text-anchor="middle" fill="#79c0ff" font-size="11" font-weight="bold">🖥️ Python Serial Dashboard</text>
  <text x="180" y="422" text-anchor="middle" fill="#8b949e" font-size="10">Live SOC gauge | Power trends</text>
  <text x="180" y="440" text-anchor="middle" fill="#8b949e" font-size="10">MPPT duty | Energy flow display</text>
  <text x="180" y="456" text-anchor="middle" fill="#8b949e" font-size="9">JSON via Serial @ 115200 baud</text>

  <!-- Arrow Arduino→Python -->
  <line x1="390" y1="310" x2="330" y2="400" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#ab)"/>
  <text x="375" y="360" fill="#79c0ff" font-size="9">USB Serial</text>

  <!-- Charge States label -->
  <rect x="30" y="220" width="310" height="110" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="185" y="242" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="bold">Charging State Machine</text>
  <text x="50" y="262" fill="#c9d1d9" font-size="10">BULK → ABSORPTION → FLOAT → EQUALIZE</text>
  <text x="50" y="280" fill="#8b949e" font-size="9">SOC  0–80%  : BULK charge  (max current)</text>
  <text x="50" y="296" fill="#8b949e" font-size="9">SOC 80–95%  : ABSORPTION  (const voltage)</text>
  <text x="50" y="312" fill="#8b949e" font-size="9">SOC  &gt;95%  : FLOAT       (maintenance)</text>
  <text x="50" y="328" fill="#8b949e" font-size="9">Periodic     : EQUALIZE   (desulfation)</text>

  <!-- Arrow state machine → battery -->
  <line x1="350" y1="255" x2="390" y2="240" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Defs -->
  <defs>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f0883e"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#8b949e"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#79c0ff"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f85149"/>
    </marker>
    <marker id="as" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#58a6ff"/>
    </marker>
  </defs>
</svg>
